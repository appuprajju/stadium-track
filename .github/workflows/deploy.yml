name: Deploy StadiumMind AI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: stadiumind-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      #####################################################
      # Authenticate with Google Cloud
      #####################################################

      - id: auth
        name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      #####################################################
      # Setup Cloud SDK
      #####################################################

      - uses: google-github-actions/setup-gcloud@v2

      #####################################################
      # Configure Docker Authentication
      #####################################################

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      #####################################################
      # Setup Docker Buildx
      #####################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #####################################################
      # Build Frontend
      #####################################################

      - name: Build Frontend Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest \
          .

      #####################################################
      # Push Frontend
      #####################################################

      - name: Push Frontend Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest

      #####################################################
      # Deploy Frontend
      #####################################################

      - name: Deploy Frontend
        run: |
          gcloud run deploy stadiummind-frontend \
          --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/frontend:latest \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated

      #####################################################
      # Build Backend
      #####################################################

      - name: Build Backend Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest \
          ./backend

      #####################################################
      # Push Backend
      #####################################################

      - name: Push Backend Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest

      #####################################################
      # Deploy Backend
      #####################################################

      - name: Deploy Backend
        run: |
          gcloud run deploy stadiummind-backend \
          --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/backend:latest \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated

      #####################################################
      # Show URLs
      #####################################################

      - name: Display Services
        run: |
          echo "Frontend"
          gcloud run services describe stadiummind-frontend \
          --region $REGION \
          --format='value(status.url)'

          echo "Backend"
          gcloud run services describe stadiummind-backend \
          --region $REGION \
          --format='value(status.url)'